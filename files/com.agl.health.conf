<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus system bus policy for the agl-health daemon.

  Install to /etc/dbus-1/system.d/com.agl.health.conf via the
  Yocto recipe (meta-agl-health/recipes-health/agl-health-daemon).

  Not required for session bus (development); the session bus
  allows all local users to own names by default.
-->
<busconfig>
  <!-- The daemon runs as user "agl-health" in production, or root
       during development. Grant ownership of the well-known name. -->
  <policy user="agl-health">
    <allow own="com.agl.health"/>
    <allow send_destination="com.agl.health"/>
  </policy>
  <policy user="root">
    <allow own="com.agl.health"/>
    <allow send_destination="com.agl.health"/>
  </policy>

  <!-- Any user can send to and receive signals from the service.
       This is intentional: the Flutter app, dbus-monitor, and
       other AGL services all need to subscribe to signals. -->
  <policy context="default">
    <allow send_destination="com.agl.health"/>
    <allow receive_sender="com.agl.health"/>
  </policy>
</busconfig>
